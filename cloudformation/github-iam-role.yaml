AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions IAM Role - Template for deploying repository-specific GitHub Actions roles that assume the shared OIDC provider'

# Stack Name: gha-role-for-aws-auto-fix-roles-${Environment}

# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this template to your target repository
# 2. Update the ProjectName parameter default to match your repository name
# 3. Optionally adjust Environment parameter if needed
# 4. Add additional managed policies or inline policies as required for your application
# 5. Deploy with: aws cloudformation create-stack --stack-name github-role-for-<repo-name>-<environment> --template-body file://github-iam-role-template.yaml --capabilities CAPABILITY_NAMED_IAM

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Repository Configuration
        Parameters:
          - Organization
          - ProjectName
          - Environment
    ParameterLabels:
      Organization:
        default: GitHub Organization
      ProjectName:
        default: Repository Name
      Environment:
        default: Environment

Parameters:
  Organization:
    Type: String
    Description: GitHub organization name
    Default: faccomichele-org
    MinLength: 1
    MaxLength: 63
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Must be lowercase alphanumeric with hyphens only
  
  ProjectName:
    Type: String
    Description: Name of the GitHub repository (change this when copying to another repo)
    Default: aws-auto-fix-roles
    MinLength: 1
    MaxLength: 100
    AllowedPattern: ^[a-zA-Z0-9._-]+$
    ConstraintDescription: Must be a valid GitHub repository name
  
  Environment:
    Type: String
    Description: Environment/Workspace (dev, stg, prod)
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

# Mapping from lower to upper as CFT does not have intrinsic functions for string case conversion
Mappings:
  EnvironmentMap:
    dev:
      Upper: DEV
    stg:
      Upper: STG
    prod:
      Upper: PROD

Resources:
  # IAM role for GitHub Actions (repository-specific)
  GHARole:
    Type: AWS::IAM::Role
    Properties:
      # Role name will be auto-generated by CloudFormation with stack name prefix
      # This ensures uniqueness and follows AWS naming best practices
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 
                - 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
                - {}
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${Organization}/${ProjectName}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        # REQUIRED: SSM parameter read policy to retrieve Terraform backend configuration
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-tf-access-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-ssm-read-${Environment}'
      # Inline policy with required Terraform permissions
      Policies:
        - PolicyName: TerraformDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ── IAM: manage roles and inline policies created by iam.tf ──────
              - Sid: IAMRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:GetRole
                  - iam:DeleteRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*'

              # PassRole is required when Terraform creates Lambda functions,
              # the Step Functions state machine, and the EventBridge rule target.
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*'

              # ── Lambda: manage functions created by lambda.tf ─────────────
              - Sid: LambdaManagement
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:GetFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListTags
                  - lambda:GetFunctionCodeSigningConfig
                  - lambda:GetPolicy
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-*'

              # ── CloudWatch Logs: manage log groups for Lambda and SFN ─────
              - Sid: CloudWatchLogsManagement
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DescribeLogGroups
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteRetentionPolicy
                  - logs:TagLogGroup
                  - logs:UntagLogGroup
                  - logs:ListTagsLogGroup
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:ListTagsForResource
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/states/${ProjectName}/*'

              # ── EventBridge: manage rules and targets from eventbridge.tf ─
              - Sid: EventBridgeManagement
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DescribeRule
                  - events:DeleteRule
                  - events:TagResource
                  - events:UntagResource
                  - events:ListTagsForResource
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                Resource:
                  - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-*'

              # ── Step Functions: manage state machine from step_functions.tf
              - Sid: StepFunctionsManagement
                Effect: Allow
                Action:
                  - states:CreateStateMachine
                  - states:DescribeStateMachine
                  - states:UpdateStateMachine
                  - states:DeleteStateMachine
                  - states:TagResource
                  - states:UntagResource
                  - states:ListTagsForResource
                Resource:
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-*'

              # ── SSM: manage the GitHub token parameter from ssm.tf ────────
              - Sid: SSMParameterManagement
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:DescribeParameters
                  - ssm:DeleteParameter
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListTagsForResource
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Organization
          Value: !Ref Organization
        - Key: Environment
          Value: !Ref Environment
        - Key: RepositoryURL
          Value: !Sub 'https://github.com/${Organization}/${ProjectName}'
        - Key: Automation
          Value: CloudFormation
        - Key: RepositoryPath
          Value: cloudformation
        - Key: RepositoryFile
          Value: github-iam-role.yaml
        - Key: Description
          Value: !Sub 'IAM role for GitHub Actions in ${Organization}/${ProjectName}'
        - Key: Region
          Value: !Ref 'AWS::Region'

Outputs:
  AwsId:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_AWS_ID = '
          - !Ref 'AWS::AccountId'
  RoleSecret:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_ROLE_SECRET = '
          - Fn::Select:
              - 8
              - Fn::Split:
                  - "-"
                  - !GetAtt GHARole.Arn
