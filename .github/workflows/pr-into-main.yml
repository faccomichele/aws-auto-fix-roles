# This triggers on all PRs to validate the change using Terraform Plan

name: Pull Request - Validate

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
    inputs:
      full-rebuild:
        description: 'Perform a full rebuild (including Lambda packaging) instead of just applying the changes. Use this if you want to deploy changes to the Lambda code without making any changes to the Terraform configuration.'
        type: boolean
        default: false
    
concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  pull-requests: write
  contents: read

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: "[BUILD]"
    uses: faccomichele-org/gha-reusables/.github/workflows/lambda-build.yml@main
    with:
      environment: 'dev'
      region: 'eu-central-1'
      working-directory: './lambdas'
      full-rebuild: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full-rebuild == 'true' }}
    secrets: inherit
  
  dev:
    needs: build
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: "[DEV]"
    uses: faccomichele-org/gha-reusables/.github/workflows/terraform-run.yml@main
    with:
      environment: 'dev'
      region: 'eu-central-1'
      working-directory: '.'
      action: 'plan'
    secrets: inherit
